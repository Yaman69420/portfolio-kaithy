<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Monochromatic Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Work+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Work Sans', sans-serif; }
        .display-font { font-family: 'Syncopate', sans-serif; }
        .mono-img { filter: grayscale(100%) contrast(1.2); transition: filter 0.5s; }
        .group:hover .mono-img { filter: grayscale(100%) contrast(1.5) brightness(0.8); }
    </style>
</head>
<body class="p-6 md:p-24 selection:bg-white selection:text-black">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-24 border-b border-white/20 pb-8">
        <h1 class="display-font text-4xl md:text-6xl uppercase tracking-[0.2em] mb-8 md:mb-0">KAITHY.</h1>
        <nav class="flex space-x-8 text-xs uppercase tracking-[0.2em] font-light">
            <a href="#" class="hover:underline underline-offset-8">Exhibits</a>
            <a href="#" class="text-gray-500 hover:text-white transition-colors">Information</a>
        </nav>
    </header>
    <main class="grid grid-cols-1 gap-16 md:gap-32">        <article class="flex flex-col md:flex-row gap-8 md:gap-16 items-center group cursor-pointer">

                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800&q=80" class="w-full h-[60vh] object-cover mono-img transform hover:scale-105 transition-transform duration-1000">
            </div>
            <div class="w-full md:w-1/2 flex flex-col justify-center">

                    <span class="text-[10px] uppercase tracking-[0.4em] text-gray-400">Digitale Kunst</span>
                    <h3 class="display-font text-2xl md:text-4xl uppercase tracking-widest mt-4 mb-8 leading-tight">Neon Dreams</h3>
                    <div class="flex items-center gap-8">
                        <span class="font-light text-xl tracking-wider">€450</span>
                        <div class="h-[1px] w-16 bg-white"></div>

                    </div>
                </div>
            </div>
        </article>        <article class="flex flex-col md:flex-row-reverse gap-8 md:gap-16 items-center group cursor-pointer">
            <div class="w-full md:w-1/2 overflow-hidden">

            </div>

                <span class="display-font text-6xl md:text-8xl text-transparent stroke-text opacity-20 mb-[-2rem] md:mb-[-3rem] z-0" style="-webkit-text-stroke: 1px white;">02</span>
                <div class="relative z-10 pl-4 md:pl-8 border-l border-white/30">
                    <span class="text-[10px] uppercase tracking-[0.4em] text-gray-400">Schilderij</span>
                    <h3 class="display-font text-2xl md:text-4xl uppercase tracking-widest mt-4 mb-8 leading-tight">Abstract Echo</h3>
                    <div class="flex items-center gap-8">
                        <span class="font-light text-xl tracking-wider">€890</span>
                        <div class="h-[1px] w-16 bg-white"></div>
                        <span class="text-xs uppercase tracking-widest hover:pl-2 transition-all">View Detail</span>
                    </div>
                </div>
            </div>
        </article>        <article class="flex flex-col md:flex-row gap-8 md:gap-16 items-center group cursor-pointer">
            <div class="w-full md:w-1/2 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?w=800&q=80" class="w-full h-[60vh] object-cover mono-img transform hover:scale-105 transition-transform duration-1000">
            </div>
            <div class="w-full md:w-1/2 flex flex-col justify-center">
                <span class="display-font text-6xl md:text-8xl text-transparent stroke-text opacity-20 mb-[-2rem] md:mb-[-3rem] z-0" style="-webkit-text-stroke: 1px white;">03</span>
                <div class="relative z-10 pl-4 md:pl-8 border-l border-white/30">
                    <span class="text-[10px] uppercase tracking-[0.4em] text-gray-400">Fotografie</span>
                    <h3 class="display-font text-2xl md:text-4xl uppercase tracking-widest mt-4 mb-8 leading-tight">Silent Flow</h3>
                    <div class="flex items-center gap-8">
                        <span class="font-light text-xl tracking-wider">€320</span>
                        <div class="h-[1px] w-16 bg-white"></div>
                        <span class="text-xs uppercase tracking-widest hover:pl-2 transition-all">View Detail</span>
                    </div>
                </div>
            </div>
        </article>    </main>

</html>
