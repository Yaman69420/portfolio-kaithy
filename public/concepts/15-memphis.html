<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Memphis Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Righteous&family=Jost:wght@400;700&display=swap');
        body { background-color: #ffd8d8; font-family: 'Jost', sans-serif; overflow-x: hidden; position: relative; }
        h1, h2, h3 { font-family: 'Righteous', cursive; }
        .squiggle { position: absolute; z-index: -1; opacity: 0.6; }
        .memphis-card { background: white; border: 4px solid #000; box-shadow: 10px 10px 0 #00e5ff; }
        .btn-memphis { background: #ffe600; border: 3px solid #000; box-shadow: 4px 4px 0 #ff0055; transition: all 0.2s; }
        .btn-memphis:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #ff0055; }
        .img-tint { position: relative; border-bottom: 4px solid black; }
        .img-tint::after { content: ''; position: absolute; inset: 0; background: #00e5ff; mix-blend-mode: screen; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-12">
    <!-- Abstract Shapes -->
    <div class="squiggle top-10 left-10 w-24 h-24 rounded-full bg-[#ffe600] border-4 border-black"></div>
    <div class="squiggle bottom-20 right-10 w-32 h-32 rotate-45 border-8 border-[#ff0055] border-dashed"></div>
    <div class="squiggle top-1/2 left-1/4 w-0 h-0 border-l-[50px] border-l-transparent border-r-[50px] border-r-transparent border-b-[80px] border-b-[#00e5ff] rotate-12"></div>

    <header class="flex justify-between items-center mb-16 relative z-10 bg-white border-4 border-black p-4 box-shadow-[8px_8px_0_#ff0055]">
        <h1 class="text-4xl text-[#ff0055] tracking-widest drop-shadow-[2px_2px_0_#000]">KAITHY</h1>
        <nav class="space-x-4 font-bold text-xl">
            <a href="#" class="hover:text-[#00e5ff]">WORK</a>
            <a href="#" class="hover:text-[#ffe600]">HELLO</a>
        </nav>
    </header>
    
    <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 relative z-10">        <article class="memphis-card flex flex-col" style="box-shadow: 10px 10px 0 #00e5ff;">
            <div class="img-tint">
                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800&q=80" class="w-full h-56 object-cover grayscale contrast-125">
            </div>
            <div class="p-6 flex-grow flex flex-col justify-between relative">
                <div class="absolute -top-5 right-4 bg-white border-4 border-black rounded-full p-2 w-12 h-12 flex items-center justify-center font-bold text-sm rotate-12 z-10">#0</div>
                <div>
                    <span class="inline-block bg-black text-white px-2 py-0.5 text-xs font-bold uppercase tracking-widest mb-3">Digitale Kunst</span>
                    <h3 class="text-3xl mb-4 leading-none">Neon Dreams</h3>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-black">€450</span>
                    <button class="btn-memphis px-4 py-2 font-bold uppercase text-sm">Grab It</button>
                </div>
            </div>
        </article>        <article class="memphis-card flex flex-col" style="box-shadow: 10px 10px 0 #ff0055;">
            <div class="img-tint">
                <img src="https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=800&q=80" class="w-full h-56 object-cover grayscale contrast-125">
            </div>
            <div class="p-6 flex-grow flex flex-col justify-between relative">
                <div class="absolute -top-5 right-4 bg-white border-4 border-black rounded-full p-2 w-12 h-12 flex items-center justify-center font-bold text-sm rotate-12 z-10">#1</div>
                <div>
                    <span class="inline-block bg-black text-white px-2 py-0.5 text-xs font-bold uppercase tracking-widest mb-3">Schilderij</span>
                    <h3 class="text-3xl mb-4 leading-none">Abstract Echo</h3>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-black">€890</span>
                    <button class="btn-memphis px-4 py-2 font-bold uppercase text-sm">Grab It</button>
                </div>
            </div>
        </article>        <article class="memphis-card flex flex-col" style="box-shadow: 10px 10px 0 #ffe600;">
            <div class="img-tint">
                <img src="https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?w=800&q=80" class="w-full h-56 object-cover grayscale contrast-125">
            </div>
            <div class="p-6 flex-grow flex flex-col justify-between relative">
                <div class="absolute -top-5 right-4 bg-white border-4 border-black rounded-full p-2 w-12 h-12 flex items-center justify-center font-bold text-sm rotate-12 z-10">#2</div>
                <div>
                    <span class="inline-block bg-black text-white px-2 py-0.5 text-xs font-bold uppercase tracking-widest mb-3">Fotografie</span>
                    <h3 class="text-3xl mb-4 leading-none">Silent Flow</h3>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-black">€320</span>
                    <button class="btn-memphis px-4 py-2 font-bold uppercase text-sm">Grab It</button>
                </div>
            </div>
        </article>    </main>
</body>
</html>
