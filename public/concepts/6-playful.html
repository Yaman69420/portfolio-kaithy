<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Playful Doodle Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f0f8ff; font-family: 'Quicksand', sans-serif; color: #4a4a4a; }
        h1, h2, h3, .fun-font { font-family: 'Fredoka One', cursive; font-weight: normal; }
        .blob-border { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; border: 4px solid #ff6b6b; }
        .wavy-hover { transition: all 0.3s; }
        .wavy-hover:hover { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(-2deg) scale(1.02); }
        .bg-dots { background-image: radial-gradient(#cbd5e1 2px, transparent 2px); background-size: 30px 30px; }
    </style>
</head>
<body class="bg-dots min-h-screen p-8 md:p-12">
    <nav class="flex justify-between items-center mb-16 bg-white p-6 rounded-full shadow-lg border-4 border-[#4ecdc4]">
        <h1 class="text-3xl fun-font text-[#ff6b6b] tracking-wider">Kaithy's Art! 🎨</h1>
        <div class="space-x-6">
            <a href="#" class="font-bold text-[#4ecdc4] hover:text-[#ff6b6b] transition-colors text-lg">Mijn Werk</a>

        </div>
    </nav>
    <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">        <article class="bg-white p-6 rounded-[2rem] shadow-xl wavy-hover cursor-pointer" style="border: 4px solid #ff6b6b;">
            <div class="overflow-hidden blob-border aspect-square mb-6">
                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800&q=80" class="w-full h-full object-cover">
            </div>
            <div class="text-center">
                <span class="inline-block bg-gray-100 text-gray-600 rounded-full px-4 py-1 text-sm font-bold mb-3 lowercase shadow-sm">#Digitale Kunst</span>
                <h3 class="text-2xl fun-font text-gray-800 mb-2">Neon Dreams</h3>
                <p class="text-xl font-bold text-[#ff6b6b]">€450</p>
                <button class="mt-6 w-full py-3 bg-[#f7fff7] border-2 border-[#ff6b6b] text-[#ff6b6b] rounded-xl font-bold hover:bg-[#ff6b6b] hover:text-white transition-colors">Bekijken ✨</button>
            </div>
        </article>        <article class="bg-white p-6 rounded-[2rem] shadow-xl wavy-hover cursor-pointer" style="border: 4px solid #4ecdc4;">
            <div class="overflow-hidden blob-border aspect-square mb-6">
                <img src="https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=800&q=80" class="w-full h-full object-cover">
            </div>
            <div class="text-center">
                <span class="inline-block bg-gray-100 text-gray-600 rounded-full px-4 py-1 text-sm font-bold mb-3 lowercase shadow-sm">#Schilderij</span>
                <h3 class="text-2xl fun-font text-gray-800 mb-2">Abstract Echo</h3>
                <p class="text-xl font-bold text-[#ff6b6b]">€890</p>
                <button class="mt-6 w-full py-3 bg-[#f7fff7] border-2 border-[#4ecdc4] text-[#4ecdc4] rounded-xl font-bold hover:bg-[#4ecdc4] hover:text-white transition-colors">Bekijken ✨</button>
            </div>
        </article>        <article class="bg-white p-6 rounded-[2rem] shadow-xl wavy-hover cursor-pointer" style="border: 4px solid #ffe66d;">
            <div class="overflow-hidden blob-border aspect-square mb-6">
                <img src="https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?w=800&q=80" class="w-full h-full object-cover">
            </div>
            <div class="text-center">
                <span class="inline-block bg-gray-100 text-gray-600 rounded-full px-4 py-1 text-sm font-bold mb-3 lowercase shadow-sm">#Fotografie</span>
                <h3 class="text-2xl fun-font text-gray-800 mb-2">Silent Flow</h3>
                <p class="text-xl font-bold text-[#ff6b6b]">€320</p>
                <button class="mt-6 w-full py-3 bg-[#f7fff7] border-2 border-[#ffe66d] text-[#ffe66d] rounded-xl font-bold hover:bg-[#ffe66d] hover:text-white transition-colors">Bekijken ✨</button>
            </div>
        </article>    </main>
</body>
</html>
