<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Neo-Brutalism Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fdf0d5; font-family: 'Courier New', Courier, monospace; }
        .brutal-border { border: 4px solid #000; box-shadow: 8px 8px 0px #000; }
        .brutal-btn { background-color: #ff006e; border: 4px solid #000; box-shadow: 4px 4px 0px #000; transition: transform 0.1s, box-shadow 0.1s; text-transform: uppercase; font-weight: bold; }
        .brutal-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #000; }
    </style>
</head>
<body class="p-8">
    <nav class="flex justify-between items-center mb-16 brutal-border bg-white p-6">
        <h1 class="text-4xl font-black uppercase tracking-tighter">KAITHY.ART</h1>
        <div class="space-x-4">
            <a href="#" class="font-bold border-b-4 border-black pb-1 hover:bg-yellow-300">Werk</a>
            <a href="#" class="font-bold border-b-4 border-black pb-1 hover:bg-blue-300">Over</a>
        </div>
    </nav>
    <main>
        <div class="brutal-border bg-yellow-300 p-12 mb-16 relative overflow-hidden">
            <h2 class="text-6xl font-black uppercase mb-6 relative z-10">Kunst die<br>breekt met regels.</h2>
            <p class="text-xl font-bold max-w-lg relative z-10">Ontdek de brute, onversneden expressie van moderne vormen en kleuren.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">            <article class="brutal-border bg-white group">
                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800&q=80" class="w-full h-64 object-cover border-b-4 border-black filter contrast-125 grayscale hover:grayscale-0 transition-all">
                <div class="p-6">
                    <span class="bg-blue-300 text-black px-2 py-1 font-bold text-sm border-2 border-black">Digitale Kunst</span>
                    <h3 class="text-2xl font-black uppercase mt-4 mb-2">Neon Dreams</h3>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-xl font-bold">€450</span>
                        <button class="brutal-btn px-4 py-2 text-white">Koop</button>
                    </div>
                </div>
            </article>            <article class="brutal-border bg-white group">
                <img src="https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=800&q=80" class="w-full h-64 object-cover border-b-4 border-black filter contrast-125 grayscale hover:grayscale-0 transition-all">
                <div class="p-6">
                    <span class="bg-blue-300 text-black px-2 py-1 font-bold text-sm border-2 border-black">Schilderij</span>
                    <h3 class="text-2xl font-black uppercase mt-4 mb-2">Abstract Echo</h3>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-xl font-bold">€890</span>
                        <button class="brutal-btn px-4 py-2 text-white">Koop</button>
                    </div>
                </div>
            </article>            <article class="brutal-border bg-white group">
                <img src="https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?w=800&q=80" class="w-full h-64 object-cover border-b-4 border-black filter contrast-125 grayscale hover:grayscale-0 transition-all">
                <div class="p-6">
                    <span class="bg-blue-300 text-black px-2 py-1 font-bold text-sm border-2 border-black">Fotografie</span>
                    <h3 class="text-2xl font-black uppercase mt-4 mb-2">Silent Flow</h3>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-xl font-bold">€320</span>
                        <button class="brutal-btn px-4 py-2 text-white">Koop</button>
                    </div>
                </div>
            </article>        </div>
    </main>
</body>
</html>
