<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Bauhaus Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f4f4; color: #1a1a1a; font-family: 'Space Grotesk', sans-serif; }
        .b-red { background-color: #e03a3e; }
        .b-blue { background-color: #0d5c9c; }
        .b-yellow { background-color: #f7b11c; }
        .b-black { background-color: #1a1a1a; }
        .bauhaus-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1rem; }
    </style>
</head>
<body class="p-8 md:p-16">
    <div class="bauhaus-grid mb-16">
        <div class="col-span-12 md:col-span-4 b-red h-8"></div>
        <div class="col-span-12 md:col-span-3 b-yellow h-8"></div>
        <div class="col-span-12 md:col-span-5 b-blue h-8"></div>
    </div>
    <header class="bauhaus-grid mb-24 items-end">
        <h1 class="col-span-12 md:col-span-8 text-7xl md:text-9xl font-bold uppercase tracking-tighter leading-none">KAITHY<br>ART.</h1>
        <nav class="col-span-12 md:col-span-4 flex flex-col space-y-4 text-2xl font-bold uppercase mt-8 md:mt-0">
            <a href="#" class="border-b-4 border-[#1a1a1a] pb-1 hover:text-[#e03a3e] hover:border-[#e03a3e] w-fit">Collectie</a>
            <a href="#" class="pb-1 hover:text-[#0d5c9c] w-fit">Informatie</a>
        </nav>
    </header>
    <main class="bauhaus-grid gap-y-16">        <article class="col-span-12 md:col-span-8 relative group">
            <div class="absolute -top-4 -left-4 w-24 h-24 b-red rounded-full z-0 mix-blend-multiply transition-transform group-hover:scale-150 duration-500"></div>
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800&q=80" class="w-full h-[32rem] object-cover relative z-10 grayscale hover:grayscale-0 transition-all duration-300 shadow-2xl">
            <div class="mt-6">
                <span class="text-xs font-bold uppercase tracking-widest border-2 border-[#1a1a1a] px-2 py-1">Digitale Kunst</span>
                <h3 class="text-3xl font-bold uppercase mt-4">Neon Dreams</h3>
                <div class="h-1 w-12 b-black mt-4 mb-4"></div>
                <p class="font-bold text-xl">€450</p>
            </div>
        </article>        <article class="col-span-12 md:col-span-4 relative group">
            <div class="absolute -top-4 -left-4 w-24 h-24 b-blue rounded-full z-0 mix-blend-multiply transition-transform group-hover:scale-150 duration-500"></div>
            <img src="https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=800&q=80" class="w-full h-80 object-cover relative z-10 grayscale hover:grayscale-0 transition-all duration-300 shadow-2xl">
            <div class="mt-6">
                <span class="text-xs font-bold uppercase tracking-widest border-2 border-[#1a1a1a] px-2 py-1">Schilderij</span>
                <h3 class="text-3xl font-bold uppercase mt-4">Abstract Echo</h3>
                <div class="h-1 w-12 b-black mt-4 mb-4"></div>
                <p class="font-bold text-xl">€890</p>
            </div>
        </article>        <article class="col-span-12 md:col-span-4 relative group">
            <div class="absolute -top-4 -left-4 w-24 h-24 b-yellow rounded-full z-0 mix-blend-multiply transition-transform group-hover:scale-150 duration-500"></div>
            <img src="https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?w=800&q=80" class="w-full h-80 object-cover relative z-10 grayscale hover:grayscale-0 transition-all duration-300 shadow-2xl">
            <div class="mt-6">
                <span class="text-xs font-bold uppercase tracking-widest border-2 border-[#1a1a1a] px-2 py-1">Fotografie</span>
                <h3 class="text-3xl font-bold uppercase mt-4">Silent Flow</h3>
                <div class="h-1 w-12 b-black mt-4 mb-4"></div>
                <p class="font-bold text-xl">€320</p>
            </div>
        </article>    </main>
</body>
</html>
