<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vaporwave Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #ff71ce, #01cdfe, #05ffa1, #b967ff); background-size: 400% 400%; animation: VapowaveGradient 15s ease infinite; color: black; font-family: "Times New Roman", serif; min-height: 100vh; }
        @keyframes VapowaveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .win95 { background: silver; border: 2px solid; border-top-color: #fff; border-left-color: #fff; border-right-color: #848584; border-bottom-color: #848584; }
        .win95-title { background: #000080; color: white; padding: 2px 4px; font-family: 'Courier New', monospace; font-weight: bold; font-size: 14px; }
        h1.vapor-text { font-size: 4rem; color: #ff71ce; text-shadow: 3px 3px 0 #01cdfe, -2px -2px 0 #ffff00; letter-spacing: 15px; font-weight: normal; margin-bottom: 2rem; text-align: center; }
        .statue { position: fixed; bottom: -50px; right: -50px; opacity: 0.6; z-index: -1; filter: sepia(1) hue-rotate(180deg); }
    </style>
</head>
<body class="p-8 md:p-12 overflow-x-hidden">
    <!-- Placeholder for ancient statue vaporwave aesthetic -->
    <div class="statue text-9xl">🗿</div>
    
    <header>
        <h1 class="vapor-text italic">K A I T H Y . A E S T H E T I C S</h1>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto relative z-10">        <article class="win95 p-1 transform transition-transform hover:scale-105">
            <div class="win95-title flex justify-between">
                <span>ART_DATA_0.EXE</span>
                <span class="bg-gray-300 text-black px-1 border border-gray-500 leading-none">x</span>
            </div>
            <div class="bg-teal-500 p-2 border-t-2 border-white">
                <div class="bg-white p-2 border border-black h-full flex flex-col items-center text-center">
                    <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800&q=80" class="w-full h-48 object-cover filter contrast-150 hue-rotate-90 saturate-200 mb-4 border-2 border-gray-400 border-dashed">
                    <h3 class="text-xl italic font-bold text-fuchsia-600 mb-1">Neon Dreams</h3>
                    <p class="font-sans text-xs uppercase tracking-widest text-cyan-600 border border-cyan-600 px-2 py-1 mb-4">Digitale Kunst</p>
                    <div class="w-full mt-auto bg-gray-200 border border-gray-400 p-2 flex justify-between items-center text-sm">
                        <span class="font-bold text-blue-800">€450</span>
                        <button class="win95 px-4 font-bold active:border-t-[#848584] active:border-l-[#848584]">DOWNLOAD</button>
                    </div>
                </div>
            </div>
        </article>        <article class="win95 p-1 transform transition-transform hover:scale-105">
            <div class="win95-title flex justify-between">
                <span>ART_DATA_1.EXE</span>
                <span class="bg-gray-300 text-black px-1 border border-gray-500 leading-none">x</span>
            </div>
            <div class="bg-teal-500 p-2 border-t-2 border-white">

                    <img src="https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=800&q=80" class="w-full h-48 object-cover filter contrast-150 hue-rotate-90 saturate-200 mb-4 border-2 border-gray-400 border-dashed">
                    <h3 class="text-xl italic font-bold text-fuchsia-600 mb-1">Abstract Echo</h3>
                    <p class="font-sans text-xs uppercase tracking-widest text-cyan-600 border border-cyan-600 px-2 py-1 mb-4">Schilderij</p>
                    <div class="w-full mt-auto bg-gray-200 border border-gray-400 p-2 flex justify-between items-center text-sm">
                        <span class="font-bold text-blue-800">€890</span>
                        <button class="win95 px-4 font-bold active:border-t-[#848584] active:border-l-[#848584]">DOWNLOAD</button>
                    </div>
                </div>
            </div>
        </article>        <article class="win95 p-1 transform transition-transform hover:scale-105">
            <div class="win95-title flex justify-between">
                <span>ART_DATA_2.EXE</span>
                <span class="bg-gray-300 text-black px-1 border border-gray-500 leading-none">x</span>
            </div>
            <div class="bg-teal-500 p-2 border-t-2 border-white">
                <div class="bg-white p-2 border border-black h-full flex flex-col items-center text-center">
                    <img src="https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?w=800&q=80" class="w-full h-48 object-cover filter contrast-150 hue-rotate-90 saturate-200 mb-4 border-2 border-gray-400 border-dashed">
                    <h3 class="text-xl italic font-bold text-fuchsia-600 mb-1">Silent Flow</h3>
                    <p class="font-sans text-xs uppercase tracking-widest text-cyan-600 border border-cyan-600 px-2 py-1 mb-4">Fotografie</p>
                    <div class="w-full mt-auto bg-gray-200 border border-gray-400 p-2 flex justify-between items-center text-sm">
                        <span class="font-bold text-blue-800">€320</span>
                        <button class="win95 px-4 font-bold active:border-t-[#848584] active:border-l-[#848584]">DOWNLOAD</button>
                    </div>
                </div>
            </div>
        </article>    </main>
</body>
</html>
