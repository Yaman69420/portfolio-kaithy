<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Neumorphism Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #e0e5ec; color: #6b7c93; font-family: 'Nunito', sans-serif; }
        .nm-flat { background: #e0e5ec; box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5); border-radius: 20px; }
        .nm-pressed { background: #e0e5ec; box-shadow: inset 6px 6px 10px 0 rgba(163,177,198, 0.7), inset -6px -6px 10px 0 rgba(255,255,255, 0.8); border-radius: 20px; }
        .nm-flat:hover { box-shadow: 12px 12px 20px rgb(163,177,198,0.7), -12px -12px 20px rgba(255,255,255, 0.6); transform: translateY(-2px); transition: all 0.3s; }
        .img-frame { border: 8px solid #e0e5ec; border-radius: 16px; box-shadow: 5px 5px 10px rgb(163,177,198,0.5), -5px -5px 10px rgba(255,255,255, 0.5); }
    </style>
</head>
<body class="p-8 md:p-16 min-h-screen">
    <header class="nm-flat flex justify-between items-center px-10 py-6 mb-16 mx-auto max-w-6xl">
        <h1 class="text-3xl font-extrabold text-[#4a5568] tracking-wider">KAITHY</h1>
        <div class="space-x-4">
            <button class="nm-pressed px-6 py-2 text-[#4a5568] font-semibold text-sm">Portfolio</button>
            <button class="nm-flat px-6 py-2 hover:text-[#4a5568] transition-colors text-sm font-semibold">Contact</button>
        </div>
    </header>
    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12">        <article class="nm-flat p-6 cursor-pointer">
            <div class="mb-6 relative overflow-hidden rounded-xl img-frame">
                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800&q=80" class="w-full h-64 object-cover transform hover:scale-110 transition-transform duration-700">
            </div>
            <div class="text-center">
                <h3 class="text-xl font-bold text-[#4a5568] mb-1">Neon Dreams</h3>
                <p class="text-sm font-semibold opacity-70 mb-6 uppercase tracking-widest">Digitale Kunst</p>
                <div class="flex justify-between items-center px-2">
                    <span class="font-extrabold text-[#4a5568] text-lg">€450</span>
                    <button class="nm-flat w-10 h-10 flex items-center justify-center rounded-full text-[#4a5568] font-bold text-xl hover:text-blue-500 transition-colors">+</button>
                </div>
            </div>
        </article>        <article class="nm-flat p-6 cursor-pointer">
            <div class="mb-6 relative overflow-hidden rounded-xl img-frame">
                <img src="https://images.unsplash.com/photo-1541961017774-22349e4a1262?w=800&q=80" class="w-full h-64 object-cover transform hover:scale-110 transition-transform duration-700">
            </div>
            <div class="text-center">
                <h3 class="text-xl font-bold text-[#4a5568] mb-1">Abstract Echo</h3>
                <p class="text-sm font-semibold opacity-70 mb-6 uppercase tracking-widest">Schilderij</p>
                <div class="flex justify-between items-center px-2">
                    <span class="font-extrabold text-[#4a5568] text-lg">€890</span>
                    <button class="nm-flat w-10 h-10 flex items-center justify-center rounded-full text-[#4a5568] font-bold text-xl hover:text-blue-500 transition-colors">+</button>
                </div>
            </div>
        </article>        <article class="nm-flat p-6 cursor-pointer">
            <div class="mb-6 relative overflow-hidden rounded-xl img-frame">
                <img src="https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?w=800&q=80" class="w-full h-64 object-cover transform hover:scale-110 transition-transform duration-700">
            </div>
            <div class="text-center">
                <h3 class="text-xl font-bold text-[#4a5568] mb-1">Silent Flow</h3>
                <p class="text-sm font-semibold opacity-70 mb-6 uppercase tracking-widest">Fotografie</p>
                <div class="flex justify-between items-center px-2">
                    <span class="font-extrabold text-[#4a5568] text-lg">€320</span>
                    <button class="nm-flat w-10 h-10 flex items-center justify-center rounded-full text-[#4a5568] font-bold text-xl hover:text-blue-500 transition-colors">+</button>
                </div>
            </div>
        </article>    </main>
</body>
</html>
